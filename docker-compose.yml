# =============================================================================
# MYiot — Universal Smart Home Hub
# Docker Compose Development Configuration
# =============================================================================
# Quick Start:
#   cp hub/.env.example hub/.env   # Edit with your values
#   docker compose up -d
#
# Services:
#   - myiot-hub:      FastAPI backend with uvicorn
#   - myiot-frontend: Vite React development server
#   - myiot-go2rtc:   RTSP → MJPEG/WebRTC proxy for camera streaming
#
# Optional services (commented out until implemented):
#   - myiot-redis:    Redis cache / message broker
#   - myiot-mqtt:     Eclipse Mosquitto MQTT broker
#   - myiot-frigate:  Frigate NVR for camera AI detection
#   - myiot-zigbee:   Zigbee2MQTT for Zigbee device support
#   - myiot-postgres: PostgreSQL production database
# =============================================================================

version: "3.9"

x-common-variables: &common-vars
  TZ: ${TZ:-UTC}

x-common-restart: &common-restart
  restart: unless-stopped

networks:
  myiot-network:
    name: myiot-network
    driver: bridge

volumes:
  hub-data:
    name: hub-data

services:
  # -------------------------------------------------------------------------
  # Backend — FastAPI + Uvicorn
  # -------------------------------------------------------------------------
  myiot-hub:
    build: ./hub
    container_name: myiot-hub
    <<: *common-restart
    ports:
      - "8000:8000"
    volumes:
      - ./hub:/app
      - hub-data:/app/data
    env_file:
      - ./hub/.env
    environment:
      <<: *common-vars
      - DEBUG=true
      - SEED_DEMO_DEVICES=false
      - GO2RTC_URL=http://myiot-go2rtc:1984
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - myiot-go2rtc
    networks:
      - myiot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -------------------------------------------------------------------------
  # Frontend — Vite React dev server
  # -------------------------------------------------------------------------
  myiot-frontend:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: myiot-frontend
    <<: *common-restart
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host
    networks:
      - myiot-network

  # -------------------------------------------------------------------------
  # go2rtc — RTSP to MJPEG/WebRTC proxy
  # -------------------------------------------------------------------------
  myiot-go2rtc:
    image: alexxit/go2rtc:latest
    container_name: myiot-go2rtc
    <<: *common-restart
    ports:
      - "1984:1984"
      - "8554:8554"
    volumes:
      - ./data/go2rtc.yaml:/config/go2rtc.yaml
    environment:
      <<: *common-vars
    networks:
      - myiot-network

  # =========================================================================
  # OPTIONAL SERVICES — Uncomment when backend support is implemented
  # =========================================================================

